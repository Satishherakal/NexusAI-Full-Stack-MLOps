{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="glass max-w-md w-full rounded-[3.5rem] p-12 border border-white/5 relative overflow-hidden">
        <div class="text-center mb-12 relative">
            <div class="w-20 h-20 rounded-3xl bg-white flex items-center justify-center text-lime-600 shadow-2xl mx-auto mb-8">
                <i class="fas fa-user-plus text-3xl"></i>
            </div>
            <h2 class="text-4xl font-black tracking-tighter mb-3">Join <span class="gradient-text">Nexus</span></h2>
            <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.4em]">Initialize New Node</p>
        </div>

        <form action="/register" method="post" class="space-y-6 relative">
            <div class="space-y-3">
                <label class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 ml-5">Entity Name</label>
                <input type="text" name="name" required placeholder="Your Name" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-4 text-slate-200 focus:outline-none focus:border-lime-500/50 transition-all font-bold">
            </div>
            <div class="space-y-3">
                <label class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 ml-5">Neural ID (Email)</label>
                <input type="email" name="email" required placeholder="name@email.com" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-4 text-slate-200 focus:outline-none focus:border-lime-500/50 transition-all font-bold">
            </div>
            <div class="space-y-3">
                <label class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 ml-5">Access Hash (Password)</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-4 text-slate-200 focus:outline-none focus:border-lime-500/50 transition-all font-bold">
            </div>

            <button type="submit" class="w-full py-5 rounded-3xl btn-green font-black text-xs uppercase tracking-[0.4em] transition-all hover:scale-[1.02] active:scale-95 shadow-2xl mt-4">
                Initialize Account
            </button>
        </form>

        <div class="mt-10 text-center text-[9px] font-black uppercase tracking-widest text-slate-700">
            Already a member? <a href="/login" class="text-lime-400 hover:underline ml-2">Login</a>
        </div>
    </div>
</div>
{% endblock %}
