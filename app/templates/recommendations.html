{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="text-center mb-24">
        <div class="inline-flex items-center gap-4 px-8 py-3 rounded-2xl glass-green border border-lime-500/20 text-lime-400 text-[10px] font-black uppercase tracking-[0.4em] mb-10">
            <i class="fas fa-microchip animate-pulse"></i> PennyLane QML Engine Active
        </div>
        <h2 class="text-7xl font-black mb-6 tracking-tighter">AI <span class="gradient-text">Matches</span></h2>
        <p class="text-slate-600 max-w-xl mx-auto leading-relaxed font-bold uppercase tracking-[0.2em] text-[10px]">Quantum Neural Networks measuring profile similarity in Hilbert Space.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        {% for match in matches %}
        <div class="glass rounded-[3.5rem] p-12 flex flex-col items-center text-center group hover:border-lime-500/30 transition-all relative overflow-hidden">
            <!-- Background Glow -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-lime-500/10 rounded-full blur-[80px] group-hover:bg-lime-500/20 transition-all"></div>
            
            <div class="relative mb-12">
                <div class="w-40 h-40 rounded-[3rem] bg-white p-1 shadow-2xl group-hover:scale-105 transition-transform duration-[2s] overflow-hidden">
                    <img src="{{ match.avatar }}" class="w-full h-full object-cover rounded-[2.8rem] bg-slate-950" alt="Avatar">
                </div>
                <div class="absolute -bottom-3 -right-3 w-16 h-16 rounded-3xl bg-black border-2 border-lime-500 flex flex-col items-center justify-center text-lime-400 font-black shadow-2xl">
                    <span class="text-xl leading-none">{{ match.sync }}</span>
                    <span class="text-[7px] uppercase tracking-tighter opacity-60">Sync</span>
                </div>
            </div>
            
            <h3 class="text-3xl font-black mb-3 text-slate-100 tracking-tighter">{{ match.name }}</h3>
            <p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.3em] mb-12">QML Similarity Score: {{ match.sync }}%</p>
            
            <div class="w-full bg-white/[0.03] h-3 rounded-full mb-14 overflow-hidden p-0.5 border border-white/5">
                <div class="bg-lime-400 h-full rounded-full transition-all duration-[2s] shadow-[0_0_20px_#a3e635]" style="width: {{ match.sync }}%"></div>
            </div>

            <button type="button" onclick="alert('Neural Link Request Sent!')" class="w-full py-6 rounded-3xl btn-beige hover:bg-lime-400 hover:text-black transition-all font-black text-[10px] uppercase tracking-[0.4em] flex items-center justify-center gap-5 shadow-xl">
                <i class="fas fa-link text-sm"></i> Request Connection
            </button>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
