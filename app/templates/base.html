<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | Neural Social Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background: #080a08; /* Deep Obsidian Forest */
            color: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(163, 230, 53, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(250, 250, 249, 0.05) 0px, transparent 50%);
        }
        .glass {
            background: rgba(10, 15, 10, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(163, 230, 53, 0.1);
        }
        .glass-green {
            background: rgba(163, 230, 53, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(163, 230, 53, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a3e635 0%, #fefce8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-beige {
            background: #fafaf9;
            color: #0c0a09;
            box-shadow: 0 4px 20px rgba(250, 250, 249, 0.2);
        }
        .btn-green {
            background: #a3e635;
            color: #064e3b;
            box-shadow: 0 4px 20px rgba(163, 230, 53, 0.3);
        }
        .green-glow { box-shadow: 0 0 15px rgba(163, 230, 53, 0.2); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass px-8 py-5 flex justify-between items-center border-b border-green-500/10">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/'">
            <div class="w-11 h-11 rounded-2xl bg-white flex items-center justify-center text-lime-600 shadow-xl shadow-white/10">
                <i class="fas fa-microchip text-xl animate-pulse"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter gradient-text">NexusAI</span>
        </div>
        <div class="hidden md:flex gap-10 font-bold text-slate-500 text-[10px] uppercase tracking-[0.3em]">
            <a href="/" class="hover:text-lime-400 transition-all">Feed</a>
            <a href="/explore" class="hover:text-lime-400 transition-all">Explore</a>
            <a href="/recommendations" class="hover:text-lime-400 transition-all">AI Matches</a>
            <a href="/mlops" class="hover:text-lime-400 transition-all text-lime-400 font-black">MLOps Dashboard</a>
            <a href="/profile" class="hover:text-lime-400 transition-all">Profile</a>
            <a href="/about" class="hover:text-lime-400 transition-all">About</a>
        </div>
        <div class="flex items-center gap-6">
            <a href="/notifications" class="relative text-slate-400 hover:text-lime-400 transition-all">
                <i class="far fa-bell text-xl"></i>
                <span class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-lime-500 text-black text-[9px] font-black rounded-full flex items-center justify-center border-2 border-black">
                    {{ user.notifications|length }}
                </span>
            </a>
            {% if logged_in %}
            <div class="flex items-center gap-4 px-4 py-2 bg-white/5 rounded-2xl border border-white/5">
                <img src="{{ user.avatar }}" class="w-8 h-8 rounded-full" alt="Avatar">
                <span class="text-[10px] font-black text-white uppercase tracking-widest">{{ user.name }}</span>
                <a href="/logout" class="flex items-center gap-2 text-rose-500 hover:text-rose-400 transition-all ml-4">
                    <i class="fas fa-power-off text-[10px]"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Logout</span>
                </a>
            </div>
            {% else %}
            <a href="/login" class="px-7 py-3 rounded-2xl btn-beige hover:scale-105 transition-all font-black text-[10px] uppercase tracking-widest">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-10 text-center text-slate-500 border-t border-slate-800/50 mt-20">
        <p>&copy; 2026 NexusAI Platform. Built with ML, DL, and Quantum Intelligence.</p>
    </footer>
</body>
</html>
